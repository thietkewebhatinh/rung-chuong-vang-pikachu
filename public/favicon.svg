<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background to match the app theme, providing a solid square mask -->
  <rect width="100" height="100" rx="20" fill="#1a0a2e"/>
  
  <!-- Top handle -->
  <path d="M45,25 v-4 c0,-3 10,-3 10,0 v4" fill="none" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Bell Body -->
  <path fill="#FFD700" d="M50,25 c-15,0 -20,16 -20,38 l-6,14 h52 l-6,-14 c0,-22 -5,-38 -20,-38 z" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Shine effect on the bell -->
  <path d="M40,35 c-5,5 -5,18 -5,22" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Clapper (qua chuong) -->
  <circle cx="50" cy="78" r="7" fill="#FFA500" stroke="#fff" stroke-width="2"/>
</svg>
